server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/user/**
        - id: post-service
          uri: http://post-service:8082
          predicates:
            - Path=/api/post/**
        - id: comment-service
          uri: http://comment-service:8083
          predicates:
            - Path=/api/comment/**
        - id: like-service
          uri: http://like-service:8084
          predicates:
            - Path=/api/like/**
      default-filters:
        - AddResponseHeader=Content-Type,application/json;charset=UTF-8

