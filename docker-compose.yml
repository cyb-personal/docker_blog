version: '3.8'

services:
  # ============= 数据存储 =============
  mysql:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:mysql
    container_name: blog-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: blog_forum
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    networks:
      - blog-net

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - blog-net

  # ============= 微服务（全部改用阿里云镜像） =============
  user-service:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:user
    container_name: blog-user
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    networks:
      - blog-net

  post-service:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:post
    container_name: blog-post
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    networks:
      - blog-net

  comment-service:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:comment
    container_name: blog-comment
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    networks:
      - blog-net

  like-service:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:like
    container_name: blog-like
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    networks:
      - blog-net

  gateway-service:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:gateway
    container_name: blog-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - post-service
      - comment-service
      - like-service
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    networks:
      - blog-net

  # ============= 前端 =============
  frontend:
    image: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com/cyb_pull/blog_docker:frontend
    container_name: blog-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
    networks:
      - blog-net

volumes:
  mysql-data:
  redis-data:

networks:
  blog-net:
    driver: bridge
