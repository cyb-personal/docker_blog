server:
  port: 8084
  servlet:
    context-path: /api/like
    encoding:
      force: true
      charset: UTF-8
      enabled: true

spring:
  http:
    encoding:
      force: true
      charset: UTF-8
      enabled: true
  application:
    name: like-service
  datasource:
    url: jdbc:mysql://blog-mysql:3306/blog_forum?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: redis
    port: 6379
    database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.like.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
