name: CI/CD Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: cyb_pull/blog_docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Aliyun Container Registry
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
            ${{ env.REGISTRY }} \
            --username="${{ secrets.ALIYUN_REGISTRY_USER }}" \
            --password-stdin

      - name: Build & push backend services
        run: |
          set -e
          for service in user-service post-service comment-service like-service gateway-service; do
            tag=${service%-service}
            echo "=== Building $service -> $tag ==="
            docker build \
              --build-arg SERVICE_NAME=$service \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag \
              ./backend
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag
          done

      - name: Build & push frontend
        run: |
          set -e
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend \
            ./frontend
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 防止旧版ssh算法问题，加上这行
          use_insecure_cipher: true
          script: |
            set -e
            cd /home/ubuntu/blog-forum
            docker-compose pull
            docker-compose down
            docker-compose up -d
            echo "=== Deploy complete ==="