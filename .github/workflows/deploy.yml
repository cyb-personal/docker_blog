name: CI/CD Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: crpi-yk34h9goabo5hi1o.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: cyb_pull/blog_docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build & push backend services
        run: |
          for service in user-service post-service comment-service like-service gateway-service; do
            tag=${service%-service}
            echo "=== Building $service -> $tag ==="
            docker build \
              --build-arg SERVICE_NAME=$service \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag \
              ./backend
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag
          done

      - name: Build & push frontend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend \
            ./frontend
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and restart services
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/blog-forum
            docker compose pull
            docker compose down
            docker compose up -d
            echo "=== Deploy complete ==="
